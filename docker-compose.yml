version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: rlrp-redis
    ports:
      - "6379:6379"

  mock-backend:
    build:
      context: ./mock_backend
      dockerfile: Dockerfile
    container_name: rlrp-mock-backend
    ports:
      - "8081:8081"
    environment:
      - APP_PORT=8081
      - APP_ENV=production
      - SLOW_ENDPOINT_DELAY_MS=3000
      - UNSTABLE_ENDPOINT_FAILURE_RATE=40

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: rlrp-api-gateway
    ports:
      - "8080:8080"
    environment:
      - APP_PORT=8080
      - APP_ENV=production
      - UPSTREAM_URL=http://mock-backend:8081
      - REDIS_ADDR=redis:6379
      - JWT_SECRET=compose-jwt-secret-key-change-in-production
    depends_on:
      - redis
      - mock-backend
