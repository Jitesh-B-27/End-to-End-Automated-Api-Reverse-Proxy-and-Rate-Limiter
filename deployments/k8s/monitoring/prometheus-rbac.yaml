# Prometheus needs permission to query the Kubernetes API
# for pod discovery. These RBAC rules grant exactly that —
# read access to pods and endpoints, nothing else.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: api-gateway
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - pods
      - endpoints
      - services
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: api-gateway