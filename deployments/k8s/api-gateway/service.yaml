apiVersion: v1
kind: Service
metadata:
  name: api-gateway-service
  namespace: api-gateway
  labels:
    app: api-gateway
    project: api-rate-limiter
spec:
  # NodePort exposes the gateway on a port on the Minikube VM.
  # This is how k6, curl, and your browser reach the gateway
  # from outside the cluster.
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
      # NodePort 30080 is fixed so your curl commands and k6
      # scripts always use the same port. Range: 30000-32767.
      nodePort: 30080
      name: http