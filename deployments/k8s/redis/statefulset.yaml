apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: api-gateway
  labels:
    app: redis
    project: api-rate-limiter
spec:
  serviceName: redis-service
  # Single Redis instance — clustering adds complexity without
  # demo benefit. One instance handles 100k+ ops/sec comfortably.
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7.2-alpine
          # Use official image directly — no custom Dockerfile needed
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6379
              name: redis
          command:
            - redis-server
            - "--appendonly"
            - "yes"
            - "--maxmemory"
            - "256mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          # Redis liveness — ping confirms the process is responding
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          # Redis readiness — same check, pod only receives traffic
          # after Redis confirms it is accepting connections
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: redis-data
              mountPath: /data
  # volumeClaimTemplates creates a PersistentVolumeClaim per pod.
  # Minikube automatically provisions the volume from local disk.
  # Rate limit counters survive Redis pod restarts.
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi