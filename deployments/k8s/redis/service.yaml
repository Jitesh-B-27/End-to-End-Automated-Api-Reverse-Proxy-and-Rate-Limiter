apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: api-gateway
  labels:
    app: redis
    project: api-rate-limiter
spec:
  # ClusterIP — Redis is internal only.
  # No external access needed or desired.
  type: ClusterIP
  selector:
    # Routes traffic to pods with label app=redis
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
      name: redis