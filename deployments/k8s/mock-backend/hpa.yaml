apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mock-backend-hpa
  namespace: api-gateway
  labels:
    app: mock-backend
    project: api-rate-limiter
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mock-backend
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          # Mock backend is lightweight so it can absorb more load
          # per pod before scaling. Higher threshold = fewer replicas.
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 1
          periodSeconds: 30
    scaleDown:
      # Wait 3 minutes before scaling down — prevents thrashing
      stabilizationWindowSeconds: 180
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60