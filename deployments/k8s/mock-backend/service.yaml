apiVersion: v1
kind: Service
metadata:
  name: mock-backend-service
  namespace: api-gateway
  labels:
    app: mock-backend
    project: api-rate-limiter
spec:
  # ClusterIP — mock backend is internal only.
  # Only the gateway reaches it. No external access.
  type: ClusterIP
  selector:
    app: mock-backend
  ports:
    - port: 8081
      targetPort: 8081
      name: http