apiVersion: v1
kind: Secret
metadata:
  name: api-gateway-secret
  namespace: api-gateway
  labels:
    project: api-rate-limiter
type: Opaque
# Values must be base64 encoded.
# To encode: echo -n "your-value" | base64
# To decode: echo "encoded" | base64 -d
#
# IMPORTANT: Never commit real secrets to GitHub.
# These are demo values safe for local development only.
#
# JWT_SECRET: "your-super-secret-jwt-key-change-in-production"
# ADMIN_TOKEN: "admin-secret-token-change-in-production"
stringData:
  # stringData accepts plain text — Kubernetes encodes it automatically.
  # Use stringData for local dev, proper secret management in production.
  JWT_SECRET: "your-super-secret-jwt-key-change-in-production"
  ADMIN_TOKEN: "admin-secret-token-change-in-production"