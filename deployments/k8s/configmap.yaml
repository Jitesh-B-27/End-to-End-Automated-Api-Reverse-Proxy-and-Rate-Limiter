apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-config
  namespace: api-gateway
  labels:
    project: api-rate-limiter
data:
  # Application
  APP_ENV: "production"
  APP_VERSION: "1.0.0"

  # Gateway config
  APP_PORT: "8080"
  APP_NAME: "api-gateway"

  # Mock backend config
  MOCK_APP_PORT: "8081"
  MOCK_APP_NAME: "mock-backend"

  # Redis — uses Kubernetes Service DNS name for resolution
  # Format: <service-name>.<namespace>.svc.cluster.local
  # Within the same namespace the short form works: redis-service:6379
  REDIS_ADDR: "redis-service:6379"
  REDIS_PASSWORD: ""
  REDIS_RATE_LIMIT_DB: "0"
  REDIS_CACHE_DB: "1"
  REDIS_POOL_SIZE: "0"
  REDIS_MIN_IDLE_CONNS: "5"
  REDIS_DIAL_TIMEOUT_SECONDS: "5"
  REDIS_READ_TIMEOUT_SECONDS: "3"
  REDIS_WRITE_TIMEOUT_SECONDS: "3"

  # Rate limiting
  RATE_LIMIT_WINDOW_SECONDS: "60"
  THROTTLE_DELAY_MS: "500"

  # Circuit breaker
  CIRCUIT_BREAKER_FAILURE_THRESHOLD: "5"
  CIRCUIT_BREAKER_RECOVERY_SECONDS: "30"

  # Proxy — uses Kubernetes Service DNS name
  BACKEND_URL: "http://mock-backend-service:8081"
  MAX_BODY_SIZE_BYTES: "1048576"

  # JWT
  JWT_EXPIRY_HOURS: "8760"

  # Mock backend behaviour knobs
  SLOW_ENDPOINT_DELAY_MS: "3000"
  UNSTABLE_ENDPOINT_FAILURE_RATE: "40"